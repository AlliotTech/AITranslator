# SwiftLint Configuration for AI Translator

# Paths to include during linting
included:
  - AITranslator

# Paths to exclude from linting
excluded:
  - AITranslator.xcodeproj
  - AITranslator/Assets.xcassets
  - .build

# Analyzer rules (require full compile)
analyzer_rules:
  - unused_declaration
  - unused_import

# Opt-in rules (not enabled by default)
opt_in_rules:
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - empty_xctest_method
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - implicit_return
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - multiline_parameters_brackets
  - operator_usage_whitespace
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - private_action
  - private_outlet
  - prohibited_super_call
  - quick_discouraged_call
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - redundant_nil_coalescing
  - redundant_type_annotation
  - required_enum_case
  - single_test_class
  - sorted_first_last
  - sorted_imports
  - static_operator
  - strong_iboutlet_collection
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

# Disabled rules
disabled_rules:
  - todo
  - trailing_comma  # Allow trailing commas

# Rule configurations
line_length:
  warning: 150
  error: 200
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 600
  error: 1000
  ignore_comment_only_lines: true

function_body_length:
  warning: 60
  error: 100

function_parameter_count:
  warning: 6
  error: 8

type_body_length:
  warning: 300
  error: 500

type_name:
  min_length: 2
  max_length:
    warning: 50
    error: 60
  excluded:
    - L10n

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - pb
    - tr
    - x
    - y
    - dx
    - dy

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level:
    warning: 2
  statement_level:
    warning: 5

trailing_whitespace:
  ignores_empty_lines: false
  ignores_comments: false

# Custom rules
custom_rules:
  # Ensure files end with a newline
  final_newline:
    name: "Final Newline"
    regex: "(?!\\n)\\z"
    message: "Files should end with a single newline."
    severity: warning

  # No multiple consecutive blank lines
  multiple_empty_lines:
    name: "Multiple Empty Lines"
    regex: "\\n{3,}"
    message: "Maximum of one empty line allowed between code blocks."
    severity: warning

  # Prefer modern Swift syntax
  legacy_objc_type:
    name: "Legacy Objective-C Type"
    regex: "\\b(NSString|NSArray|NSDictionary|NSNumber)(?!\\s*\\.)"
    message: "Use Swift native types instead of legacy Objective-C types."
    severity: warning

# Reporter type (xcode, json, csv, checkstyle, junit, html, emoji, markdown)
reporter: "xcode"

# Treat warnings as errors for CI
strict: false

# Warnings threshold
warning_threshold: 100
