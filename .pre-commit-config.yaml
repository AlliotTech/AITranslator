# Pre-commit hooks for AI Translator
# See https://pre-commit.com for more information

repos:
  # 通用文件检查
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # 确保文件以换行符结尾
      - id: end-of-file-fixer
        name: 修复文件末尾换行符
        types: [swift]

      # 删除尾随空格
      - id: trailing-whitespace
        name: 删除尾随空格
        types: [swift]


